version: "3.9"

networks:
  private_network:
    driver: bridge

services:
  postgres-zvezde-oriona-website:
    image: postgres:16
    container_name: postgres-zvezde-oriona-website
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - private_network
    volumes:
      - ./database/data:/var/lib/postgresql/data
